<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Register</title><link rel="stylesheet" href="style.css"></head>
<body style="display:flex;justify-content:center;align-items:center;min-height:100vh">
    <div class="card" style="width:100%;max-width:450px">
        <h2 style="text-align:center;margin-bottom:.3rem">Register</h2>
        <p style="text-align:center;color:var(--muted);margin-bottom:2rem">Creating <strong id="rl" style="color:var(--green)"></strong> account</p>
        <form id="f">
            <label>Organization Name</label><input type="text" id="name" required>
            <label>Email</label><input type="email" id="email" required>
            <label>Password</label><input type="password" id="pw" required>
            <button type="submit" class="btn btn-green btn-full">Create Account</button>
        </form>
        <p style="text-align:center;margin-top:1rem;font-size:.9rem"><a href="login.html" style="color:var(--primary)">Already registered? Login</a></p>
    </div>
    <script>
        const API='http://localhost:3000',role=localStorage.getItem('v4_role')||'Hotel';
        document.getElementById('rl').innerText=role;
        document.getElementById('f').onsubmit=async e=>{e.preventDefault();
            const r=await(await fetch(API+'/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('name').value,email:document.getElementById('email').value,password:document.getElementById('pw').value,role})})).json();
            if(r.success){alert('Account created!');location.href='login.html'}else alert(r.error||'Failed')};
    </script>
</body>
</html>
